<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Eligald Industrial Chemicals</title>
  <meta name="robots" content="noindex,nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g900: #0A3D0F;
      --g800: #1B5E20;
      --g700: #2E7D32;
      --g600: #388E3C;
      --g500: #4CAF50;
      --g400: #81C784;
      --g300: #A5D6A7;
      --g200: #C8E6C9;
      --g100: #DCEDC8;
      --g50:  #F1F8E9;
      --charcoal: #2D2D2D;
      --muted: #6B7280;
      --radius: 16px;
      --radius-sm: 10px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--g900);
      overflow: hidden;
      position: relative;
    }

    /* ── Animated background ─────────────────────────────── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.45;
      animation: orbFloat 12s ease-in-out infinite alternate;
    }
    .bg-orb:nth-child(1) {
      width: 600px; height: 600px;
      background: var(--g700);
      top: -200px; left: -150px;
      animation-duration: 14s;
    }
    .bg-orb:nth-child(2) {
      width: 500px; height: 500px;
      background: var(--g600);
      bottom: -180px; right: -100px;
      animation-duration: 10s;
      animation-delay: -4s;
    }
    .bg-orb:nth-child(3) {
      width: 300px; height: 300px;
      background: var(--g400);
      top: 40%; left: 50%;
      transform: translate(-50%,-50%);
      animation-duration: 18s;
      animation-delay: -8s;
      opacity: 0.2;
    }
    @keyframes orbFloat {
      0%   { transform: translate(0,0) scale(1); }
      50%  { transform: translate(30px, -20px) scale(1.05); }
      100% { transform: translate(-20px, 30px) scale(0.95); }
    }

    /* Grid overlay */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(165,214,167,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(165,214,167,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* Floating particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      background: var(--g300);
      opacity: 0;
      animation: particleRise linear infinite;
      z-index: 0;
    }
    @keyframes particleRise {
      0%   { opacity: 0;    transform: translateY(0) scale(0); }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.15; }
      100% { opacity: 0;    transform: translateY(-100vh) scale(1.5); }
    }

    /* ── Wrapper ─────────────────────────────────────────── */
    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
      animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ── Card ────────────────────────────────────────────── */
    .login-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(165,214,167,0.18);
      border-radius: var(--radius);
      padding: 44px 40px 40px;
      box-shadow:
        0 24px 80px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* ── Brand ───────────────────────────────────────────── */
    .login-brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-flask-wrap {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--g700), var(--g500));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      font-size: 2rem;
      box-shadow: 0 8px 32px rgba(76,175,80,0.4);
      animation: flaskPulse 3s ease-in-out infinite;
    }
    @keyframes flaskPulse {
      0%,100% { box-shadow: 0 8px 32px rgba(76,175,80,0.4); }
      50%      { box-shadow: 0 8px 48px rgba(76,175,80,0.65); }
    }
    .brand-name {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 1.55rem;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .brand-name span { color: var(--g300); }
    .brand-tagline {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.45);
      margin-top: 5px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── Divider ─────────────────────────────────────────── */
    .login-divider {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(165,214,167,0.15);
    }
    .login-divider span {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Error alert ─────────────────────────────────────── */
    .error-alert {
      background: rgba(239,83,80,0.15);
      border: 1px solid rgba(239,83,80,0.35);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      animation: shakeIn 0.4s cubic-bezier(0.36,0.07,0.19,0.97);
    }
    @keyframes shakeIn {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }
    .error-alert i  { color: #EF5350; font-size: 0.95rem; flex-shrink: 0; }
    .error-alert span { font-size: 0.84rem; color: #FFCDD2; }

    /* ── Form labels ─────────────────────────────────────── */
    .form-group { margin-bottom: 20px; }
    .form-label-custom {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 8px;
    }

    /* ── Input field ─────────────────────────────────────── */
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      color: rgba(165,214,167,0.5);
      font-size: 0.9rem;
      pointer-events: none;
      transition: color 0.2s;
      z-index: 1;
    }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(165,214,167,0.2);
      border-radius: var(--radius-sm);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      padding: 13px 44px;
      outline: none;
      transition: all 0.25s;
      -webkit-autofill: unset;
    }
    .form-input::placeholder { color: rgba(255,255,255,0.25); }
    .form-input:focus {
      border-color: var(--g400);
      background: rgba(255,255,255,0.09);
      box-shadow: 0 0 0 3px rgba(129,199,132,0.18);
    }
    .form-input:focus + .input-icon,
    .input-wrap:focus-within .input-icon { color: var(--g400); }
    /* autocomplete bg fix */
    .form-input:-webkit-autofill,
    .form-input:-webkit-autofill:hover,
    .form-input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px rgba(27,94,32,0.9) inset !important;
      -webkit-text-fill-color: #fff !important;
      border-color: var(--g400) !important;
    }
    .pw-btn {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      color: rgba(165,214,167,0.4);
      cursor: pointer;
      padding: 4px;
      font-size: 0.9rem;
      transition: color 0.2s;
      z-index: 1;
    }
    .pw-btn:hover { color: var(--g300); }

    /* ── Submit button ───────────────────────────────────── */
    .btn-signin {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--g600) 0%, var(--g500) 100%);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
      margin-top: 8px;
      box-shadow: 0 4px 20px rgba(76,175,80,0.35);
    }
    .btn-signin::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .btn-signin:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(76,175,80,0.5); }
    .btn-signin:hover::before { opacity: 1; }
    .btn-signin:active { transform: translateY(0); }
    .btn-signin.loading { pointer-events: none; opacity: 0.75; }
    .btn-signin .btn-content { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer link ─────────────────────────────────────── */
    .login-footer {
      text-align: center;
      margin-top: 28px;
    }
    .login-footer a {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.38);
      text-decoration: none;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .login-footer a:hover { color: var(--g300); }

    /* ── Security badge ──────────────────────────────────── */
    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.05em;
    }
    .security-badge i { font-size: 0.7rem; color: var(--g400); opacity: 0.6; }

    @media (max-width: 480px) {
      .login-card { padding: 32px 24px; }
      .brand-name { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<!-- Animated background -->
<div class="bg-canvas">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>
<div class="bg-grid"></div>

<!-- Particles (injected by JS) -->

<div class="login-wrapper">
  <div class="login-card">

    <!-- Brand -->
    <div class="login-brand">
      <div class="brand-flask-wrap">⚗</div>
      <div class="brand-name">Eligald <span>Admin</span></div>
      <div class="brand-tagline">Industrial Chemicals Management System</div>
    </div>

    <!-- Divider -->
    <div class="login-divider"><span>Sign in to continue</span></div>

    <!-- Error -->
    {% if error %}
    <div class="error-alert">
      <i class="fas fa-exclamation-circle"></i>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <!-- Form -->
    <form method="POST" action="{{ url_for('admin_bp.login') }}" id="loginForm" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

      <div class="form-group">
        <label class="form-label-custom" for="username">Username</label>
        <div class="input-wrap">
          <i class="fas fa-user input-icon"></i>
          <input type="text" class="form-input" id="username" name="username"
                 placeholder="Enter your username" required autofocus autocomplete="username"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label-custom" for="password">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" class="form-input" id="password" name="password"
                 placeholder="Enter your password" required autocomplete="current-password"/>
          <button type="button" class="pw-btn" id="pwToggle" aria-label="Toggle password visibility">
            <i class="fas fa-eye" id="pwIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-signin" id="signInBtn">
        <span class="btn-content">
          <div class="spinner" id="spinner"></div>
          <i class="fas fa-sign-in-alt" id="signinIcon"></i>
          <span id="signinText">Sign In</span>
        </span>
      </button>

    </form>

    <!-- Footer -->
    <div class="login-footer">
      <a href="{{ url_for('index') }}">
        <i class="fas fa-arrow-left"></i>
        Back to public website
      </a>
    </div>

    <div class="security-badge">
      <i class="fas fa-shield-halved"></i>
      Secured · Sessions expire after 8 hours
    </div>

  </div>
</div>

<script>
  /* Password toggle */
  document.getElementById('pwToggle').addEventListener('click', function() {
    const inp  = document.getElementById('password');
    const icon = document.getElementById('pwIcon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      inp.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  });

  /* Loading state on submit */
  document.getElementById('loginForm').addEventListener('submit', function() {
    const btn     = document.getElementById('signInBtn');
    const spinner = document.getElementById('spinner');
    const icon    = document.getElementById('signinIcon');
    const text    = document.getElementById('signinText');
    btn.classList.add('loading');
    spinner.style.display = 'block';
    icon.style.display    = 'none';
    text.textContent      = 'Signing in…';
  });

  /* Floating particles */
  (function spawnParticles() {
    const count = 18;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 5 + 3;
      p.style.cssText = [
        `width:${size}px`,
        `height:${size}px`,
        `left:${Math.random() * 100}vw`,
        `bottom:-${size}px`,
        `animation-duration:${Math.random() * 12 + 10}s`,
        `animation-delay:${Math.random() * 10}s`,
      ].join(';');
      document.body.appendChild(p);
    }
  })();
</script>
</body>
</html>
