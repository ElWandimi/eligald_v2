    <path d="M-30,-10 L-55,40 Q-62,55,-50,62 L50,62 Q62,55,55,40 L30,-10 Z"
          fill="#C8E6C9" opacity="0.7"/>
    <circle cx="-15" cy="30" r="6" fill="#4CAF50" opacity="0.6"/>
    <circle cx="10"  cy="45" r="4" fill="#388E3C" opacity="0.5"/>
    <circle cx="25"  cy="25" r="8" fill="#81C784" opacity="0.5"/>
    <line x1="-38" y1="-55" x2="38" y2="-55" stroke="#81C784" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="300" y="278" text-anchor="middle"
        font-family="'Poppins',sans-serif" font-size="13"
        font-weight="600" fill="#388E3C" opacity="0.7">
