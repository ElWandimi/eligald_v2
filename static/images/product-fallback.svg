<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <rect width="600" height="400" fill="#F1F8E9"/>
  <rect x="0" y="0" width="600" height="400" fill="url(#grid)" opacity="0.4"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#C8E6C9" stroke-width="1"/>
    </pattern>
  </defs>
  <!-- Flask icon -->
  <g transform="translate(300,185)">
    <path d="M-30,-55 L-30,-10 L-55,40 Q-62,55,-50,62 L50,62 Q62,55,55,40 L30,-10 L30,-55 Z"
